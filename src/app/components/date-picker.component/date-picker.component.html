<div class="drp-wrapper">
  <button class="drp-trigger" (click)="toggleDropdown()" [class.open]="isOpen">
    <svg class="drp-icon-cal" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="2" width="14" height="13" rx="2" stroke="currentColor" stroke-width="1.4"/>
      <path d="M1 6h14" stroke="currentColor" stroke-width="1.4"/>
      <path d="M5 1v2M11 1v2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
    <span>{{ displayLabel }}</span>
    <svg class="drp-icon-chevron" [class.rotated]="isOpen" viewBox="0 0 10 6" fill="none">
      <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="drp-panel" *ngIf="isOpen" (mousedown)="$event.stopPropagation()">
    <div class="drp-layout">

      <div class="drp-presets">
        <button
          *ngFor="let preset of presets"
          class="drp-preset-btn"
          [class.active]="selectedPreset === preset.key"
          (click)="selectPreset(preset.key)"
        >
          {{ preset.label }}
        </button>

        <div class="drp-actions">
          <button class="drp-action-confirm" (click)="confirm()">Confirm</button>
          <button class="drp-action-reset" (click)="reset()">Reset</button>
        </div>
      </div>

      <div class="drp-calendar">
        <div class="drp-cal-header">
          <span class="drp-month-label">{{ monthLabel }}</span>
          <div class="drp-nav">
            <button class="drp-nav-btn" (click)="prevMonth()">
              <svg viewBox="0 0 6 10" fill="none">
                <path d="M5 1L1 5l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button class="drp-nav-btn" (click)="nextMonth()">
              <svg viewBox="0 0 6 10" fill="none">
                <path d="M1 1l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="drp-grid">
          <div class="drp-weekday" *ngFor="let d of weekDays">{{ d }}</div>

          <div
            *ngFor="let day of calendarDays"
            class="drp-day"
            [class.other-month]="!day.currentMonth"
            [class.today]="day.isToday"
            [class.start]="day.isStart"
            [class.end]="day.isEnd"
            [class.in-range]="day.inRange"
            [class.range-start-cap]="day.isStart && (day.inRange || day.isEnd)"
            [class.range-end-cap]="day.isEnd && (day.inRange || day.isStart)"
            (mousedown)="onDayClick(day); $event.preventDefault()"
            (mouseenter)="onDayHover(day)"
          >
            <span class="drp-day-inner">{{ day.date.getDate() }}</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
